name: CI - Space Defender

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  # --- JOB 1: RUN TESTS ---
  test:
    name: Build & Tests NUnit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache Unity Library
        uses: actions/cache@v3
        with:
          path: Library
          key: Library-test-${{ hashFiles('Assets/**', 'Packages/**') }}
          restore-keys: Library-test-

      - name: Run Tests (EditMode)
        uses: game-ci/unity-test-runner@v4
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL:   ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        with:
          projectPath: .
          testMode: EditMode
          artifactsPath: test-results/
          coverageOptions: generateAdditionalMetrics;generateHtmlReport

      - name: Upload Test Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: test-results/
          retention-days: 14

  # --- JOB 2: BUILD WEBGL ---
  build:
    name: Build WebGL
    needs: test  # This ensures the build only starts if tests pass
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' # Only builds on the main branch
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache Unity Library
        uses: actions/cache@v3
        with:
          path: Library
          key: Library-build-${{ hashFiles('Assets/**', 'Packages/**') }}
          restore-keys: Library-build-

      - name: Build WebGL
        uses: game-ci/unity-builder@v4
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL:   ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        with:
          targetPlatform: WebGL
          buildName: SpaceDefender
          projectPath: .

      - name: Upload Build
        uses: actions/upload-artifact@v4
        with:
          name: build-webgl
          path: build/WebGL/
          retention-days: 30
